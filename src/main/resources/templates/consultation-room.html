<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultorio Virtual - Hospy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 text-slate-800 p-8 min-h-screen">

    <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold text-blue-900">Módulo Clínico: Consulta Activa</h1>
            <a href="/doctor/dashboard" class="bg-white border rounded-lg px-4 py-2 text-slate-600 hover:bg-slate-50 font-medium">Cancelar y Volver</a>
        </div>

        <div class="grid grid-cols-3 gap-6">
            <!-- Sidebar Paciente -->
            <div class="col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-sm uppercase tracking-wider text-slate-400 font-bold mb-4">Paciente en Atención</h3>
                    <div class="text-xl font-bold text-slate-800" th:text="${appointment.patient.firstName + ' ' + appointment.patient.lastName}">Nombre Paciente</div>
                    <div class="text-slate-500 mt-1 mb-4" th:text="${'DNI: ' + appointment.patient.dni}">DNI</div>
                    
                    <div class="text-sm bg-slate-50 p-4 rounded-lg flex flex-col gap-2">
                        <div class="flex justify-between"><span class="text-slate-500">Motivo de Cita:</span> <span class="font-medium" th:text="${appointment.reason}">Consulta General</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Tipo Sangre:</span> <span class="font-bold text-red-600" th:text="${appointment.patient.bloodType}">O+</span></div>
                    </div>
                </div>
            </div>

            <!-- Formulario Principal -->
            <div class="col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                <form th:action="@{/doctor/consultation/{id}(id=${appointment.id})}" method="post" class="space-y-8">
                    
                    <section>
                        <h2 class="text-lg font-bold border-b pb-2 mb-4 text-blue-800">1. Signos Vitales (Triage)</h2>
                        <div class="grid grid-cols-4 gap-4">
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-700">Presión (Sis)</label>
                                <input type="number" step="0.1" name="bloodPressureSystolic" placeholder="120" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-700">Presión (Dia)</label>
                                <input type="number" step="0.1" name="bloodPressureDiastolic" placeholder="80" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-700">Peso (Kg)</label>
                                <input type="number" step="0.1" name="weight" placeholder="70.5" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-700">Temp (°C)</label>
                                <input type="number" step="0.1" name="temperature" placeholder="36.5" class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500">
                            </div>
                        </div>
                    </section>
                    
                    <section>
                        <h2 class="text-lg font-bold border-b pb-2 mb-4 text-blue-800">2. Cuadro Clínico</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-700">Síntomas Actuales (Subjetivo)</label>
                                <textarea name="currentSymptoms" rows="3" required class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1 text-slate-700">Exploración Física (Objetivo)</label>
                                <textarea name="physicalExamination" rows="3" required class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500"></textarea>
                            </div>
                        </div>
                    </section>

                    <section>
                        <h2 class="text-lg font-bold border-b pb-2 mb-4 text-blue-800">3. Evaluación (Diagnóstico Médico)</h2>
                        <textarea name="diagnostics" rows="4" required placeholder="Juicio clínico final..." class="w-full px-3 py-2 border rounded-lg focus:ring-blue-500 bg-blue-50/30 font-medium"></textarea>
                    </section>

                    <div class="pt-4 flex justify-end gap-4">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            Completar y Guardar en Historial Clínico
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</body>
</html>
