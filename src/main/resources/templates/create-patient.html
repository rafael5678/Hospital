<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Añadir Paciente - Hospy Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-emerald-50 min-h-screen p-8 text-slate-800">

    <div class="max-w-2xl mx-auto">
        
        <div class="flex items-center mb-8 gap-4">
            <a href="/admin/dashboard" class="bg-white p-2 rounded-lg shadow-sm hover:bg-slate-50 transition-colors">Volver al Panel</a>
            <h1 class="text-2xl font-bold text-emerald-800">Alta de Nuevo Paciente</h1>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-emerald-100">
            
            <div th:if="${success}" class="bg-green-100 text-green-700 p-4 rounded-lg mb-6 font-medium">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="bg-red-100 text-red-700 p-4 rounded-lg mb-6 font-medium">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/admin/patients/create}" method="post" class="space-y-4">
                
                <h3 class="text-lg font-semibold border-b pb-2 mb-4">Datos Personales y de Identificación</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nombre</label>
                        <input type="text" name="firstName" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-emerald-500 focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Apellido</label>
                        <input type="text" name="lastName" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-emerald-500 focus:border-emerald-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">DNI / Número de Identificación</label>
                    <input type="text" name="dni" placeholder="Ej: 12345678" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-emerald-500 focus:border-emerald-500">
                </div>

                <h3 class="text-lg font-semibold border-b pb-2 mt-8 mb-4">Credenciales Iniciales</h3>
                <p class="text-sm text-slate-500 mb-4">Se creará un acceso al portal para que el paciente administre sus citas.</p>
                <div>
                    <label class="block text-sm font-medium mb-1">Correo Electrónico</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-emerald-500 focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Contraseña Genérica</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-emerald-500 focus:border-emerald-500">
                </div>

                <button type="submit" class="w-full py-3 mt-6 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-bold shadow-sm transition-colors">
                    Registrar e Ingresar al Sistema
                </button>
            </form>
        </div>
    </div>
</body>
</html>
