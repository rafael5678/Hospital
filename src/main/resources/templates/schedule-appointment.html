<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita - Hospy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-slate-800">

    <div class="w-64 bg-emerald-900 text-white flex flex-col">
        <div class="p-6 border-b border-emerald-800">
            <h2 class="text-2xl font-bold flex items-center gap-2">
                Hospy Centro
            </h2>
            <p class="text-emerald-300 text-sm mt-1">Portal Paciente</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/patient/dashboard" class="flex items-center gap-3 text-emerald-200 hover:text-white p-3 rounded-lg transition-colors">
                Regresar a Mi Agenda
            </a>
            <a href="#" class="flex items-center gap-3 bg-emerald-800 text-white p-3 rounded-lg font-medium shadow-sm transition-colors">
                Nueva Consulta
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-8">
        
        <div class="max-w-3xl mx-auto">
            <h1 class="text-2xl font-bold text-slate-800 mb-6">Programar Consulta Médica</h1>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
                <form th:action="@{/patient/appointments/new}" method="post" class="space-y-6">
                    
                    <div>
                        <label class="block text-sm font-semibold mb-2">Paso 1: Selecciona a tu Médico</label>
                        <select name="doctorId" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 font-medium">
                            <option value="">-- Elige un Profesional --</option>
                            <option th:each="doc : ${doctors}" th:value="${doc.id}" th:text="|Dr. ${doc.lastName} (${doc.specialty})|"></option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold mb-2">Paso 2: Fecha de Consulta</label>
                            <input type="date" name="appointmentDate" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2">Turno / Hora</label>
                            <select name="appointmentTime" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500">
                                <option value="08:00">08:00 AM</option>
                                <option value="09:00">09:00 AM</option>
                                <option value="10:00">10:00 AM</option>
                                <option value="11:00">11:00 AM</option>
                                <option value="14:00">02:00 PM</option>
                                <option value="15:00">03:00 PM</option>
                                <option value="16:00">04:00 PM</option>
                                <option value="17:00">05:00 PM</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2">Paso 3: Motivo de tu Visita</label>
                        <textarea name="reason" rows="3" placeholder="Describe brevemente tus síntomas..." required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500"></textarea>
                    </div>

                    <div class="border-t pt-6 text-right">
                        <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-lg shadow-sm">
                            Confirmar Agendamiento
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>

</body>
</html>
