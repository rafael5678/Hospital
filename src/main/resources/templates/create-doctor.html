<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Médico - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-purple-50 min-h-screen p-8 text-slate-800">

    <div class="max-w-2xl mx-auto">
        
        <div class="flex items-center mb-8 gap-4">
            <a href="/admin/dashboard" class="bg-white p-2 rounded-lg shadow-sm hover:bg-slate-50">Volver al Panel</a>
            <h1 class="text-2xl font-bold text-purple-800">Alta de Nuevo Médico</h1>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-purple-100">
            
            <div th:if="${success}" class="bg-green-100 text-green-700 p-4 rounded-lg mb-6 font-medium">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="bg-red-100 text-red-700 p-4 rounded-lg mb-6 font-medium">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/admin/doctors/create}" method="post" class="space-y-4">
                
                <h3 class="text-lg font-semibold border-b pb-2 mb-4">Datos Personales</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nombre</label>
                        <input type="text" name="firstName" required class="w-full px-4 py-2 border rounded-lg focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Apellido</label>
                        <input type="text" name="lastName" required class="w-full px-4 py-2 border rounded-lg focus:ring-purple-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Especialidad Temática</label>
                    <input type="text" name="specialty" placeholder="Cardiología, Pediatría..." required class="w-full px-4 py-2 border rounded-lg focus:ring-purple-500">
                </div>

                <h3 class="text-lg font-semibold border-b pb-2 mt-8 mb-4">Detalles Operativos</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Número de Contacto</label>
                        <input type="text" name="contactNumber" placeholder="+1 234 567 8900" required class="w-full px-4 py-2 border rounded-lg focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Modalidad de Atención</label>
                        <select name="modality" required class="w-full px-4 py-2 border rounded-lg focus:ring-purple-500 bg-white">
                            <option value="Presencial">Presencial (Consultorio)</option>
                            <option value="Virtual">Virtual (Telemedicina)</option>
                            <option value="Híbrido">Modelo Híbrido</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Horarios Disponibles</label>
                    <input type="text" name="availabilityHours" placeholder="Lun a Jue: 08:00 AM - 15:00 PM" required class="w-full px-4 py-2 border rounded-lg focus:ring-purple-500">
                </div>

                <h3 class="text-lg font-semibold border-b pb-2 mt-8 mb-4">Credenciales de Acceso</h3>
                <div>
                    <label class="block text-sm font-medium mb-1">Email Profesional</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-purple-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Contraseña Temporal</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-purple-500">
                </div>

                <button type="submit" class="w-full py-3 mt-6 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold">
                    Registrar Médico en el Sistema
                </button>
            </form>
        </div>
    </div>
</body>
</html>
