<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Portal Médico - Hospy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-slate-800">

    <!-- Sidebar -->
    <div class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6 border-b border-slate-800">
            <h2 class="text-2xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Hospy Med
            </h2>
            <p class="text-slate-400 text-sm mt-1">Especialistas</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/doctor/dashboard" class="flex items-center gap-3 bg-blue-600 text-white p-3 rounded-lg font-medium shadow-sm transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Agenda Activa
            </a>
            <a href="#" class="flex items-center gap-3 text-slate-400 hover:text-white p-3 rounded-lg font-medium transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Mis Pacientes
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <a href="/logout" class="flex items-center gap-3 text-slate-400 hover:text-white p-2 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Cerrar Sesión
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-8">
        
        <div class="bg-blue-600 rounded-2xl p-8 shadow-md text-white mb-8 bg-cover bg-center" style="background-image: url('https://www.transparenttextures.com/patterns/cubes.png');">
            <h1 class="text-3xl font-bold mb-2" th:text="${'Dr. ' + doctor.lastName}">Dr. Apellido</h1>
            <p class="text-blue-100 font-medium tracking-wide border-b border-blue-400 inline-block pb-1" th:text="${doctor.specialty}">Especialidad</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-lg font-bold text-slate-800">Pacientes Agendados</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-sm">
                        <tr>
                            <th class="p-4 font-medium">Paciente</th>
                            <th class="p-4 font-medium">Fecha y Hora</th>
                            <th class="p-4 font-medium">Estado</th>
                            <th class="p-4 font-medium text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="appt : ${appointments}" class="hover:bg-slate-50/50 transition-colors group">
                            <td class="p-4">
                                <div class="font-medium text-slate-800" th:text="${appt.patient.firstName + ' ' + appt.patient.lastName}">Paciente</div>
                                <div class="text-xs text-slate-500" th:text="${'DNI: ' + appt.patient.dni}">DNI</div>
                            </td>
                            <td class="p-4">
                                <div class="text-sm font-medium" th:text="${appt.appointmentDate}">N/A</div>
                                <div class="text-xs text-slate-500" th:text="${appt.appointmentTime}">N/A</div>
                            </td>
                            <td class="p-4 text-sm font-medium">
                                <span th:if="${appt.status.name() == 'PENDING'}" class="text-amber-600">Pendiente</span>
                                <span th:if="${appt.status.name() == 'CONFIRMED'}" class="text-blue-600">Confirmada</span>
                                <span th:if="${appt.status.name() == 'COMPLETED'}" class="text-emerald-600">Atendido</span>
                            </td>
                            <td class="p-4 flex gap-2">
                                <form th:if="${appt.status.name() == 'PENDING'}" th:action="@{/doctor/appointments/{id}/status(id=${appt.id})}" method="post">
                                    <input type="hidden" name="action" value="ACCEPT">
                                    <button type="submit" class="bg-emerald-100 text-emerald-700 hover:bg-emerald-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Aceptar</button>
                                </form>
                                <form th:if="${appt.status.name() == 'PENDING'}" th:action="@{/doctor/appointments/{id}/status(id=${appt.id})}" method="post">
                                    <input type="hidden" name="action" value="REJECT">
                                    <button type="submit" class="bg-red-100 text-red-700 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Rechazar</button>
                                </form>
                                <a th:if="${appt.status.name() == 'CONFIRMED'}" th:href="@{/doctor/consultation/{id}(id=${appt.id})}" class="bg-blue-100 text-blue-700 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">
                                    Consultar
                                </a>
                                <span th:if="${appt.status.name() == 'COMPLETED'}" class="text-slate-400 text-xs">Cerrada</span>
                                <span th:if="${appt.status.name() == 'CANCELLED'}" class="text-red-400 text-xs line-through">Cancelada</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(appointments)}">
                            <td colspan="4" class="p-8 text-center text-slate-400">
                                Tu agenda está libre por el momento.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</body>
</html>
