<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Paciente - Hospy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#00a87a] min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-white mb-2">Registro de Nuevo Paciente</h1>
        <p class="text-white/80 font-medium">Únete al Sistema Hospy libremente</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        
        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
            <span class="block sm:inline" th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
                    <input type="text" name="firstName" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Apellido</label>
                    <input type="text" name="lastName" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">DNI o Documento</label>
                <input type="text" name="dni" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input type="password" name="password" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none">
            </div>
            
            <button type="submit" class="w-full py-3 px-4 text-white font-bold rounded-lg shadow-sm transition-all focus:outline-none focus:ring-4 bg-[#10b981] hover:bg-emerald-600 focus:ring-emerald-300 mt-4">
                Completar Registro
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <a href="/login?role=patient" class="text-slate-500 hover:text-slate-700 transition-colors">
                ¿Ya tienes cuenta? Inicia Sesión
            </a>
        </div>
    </div>
</body>
</html>
